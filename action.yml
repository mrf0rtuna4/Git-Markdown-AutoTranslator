name: Generate Localized Markdown File
description: Generates localised files for your git
author: mrf0rtuna4
branding:
  icon: 'cloud-lightning'
  color: 'green'
inputs:
  files:
    description: 'List of files to be translated, separated by commas'
    required: true
    default: 'README.md'
  langs:
    description: 'List of languages, separated by commas'
    required: true
    default: 'en,ru'
  debug:
    description: 'Toggling debug mode'
    required: false
    default: 'false'
  max_threads:
    description: 'Maximum number of threads for translation'
    required: false
    default: '5'
  max_line_length:
    description: 'Maximum line length'
    required: false
    default: '500'
runs:
  using: 'docker'
  image: 'Dockerfile'
  args:
    - ${{ inputs.files }}
    - ${{ inputs.langs }}
    - ${{ inputs.debug }}
    - ${{ inputs.max_threads }}
    - ${{ inputs.max_line_length }}